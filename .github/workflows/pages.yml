name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A9C9C5: ${{ secrets.A9C9C5 }}
          BC5ECD: ${{ secrets.BC5ECD }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A9C9C5', '')
          bm = os.environ.get('BC5ECD', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s
              if gm:
                  s2 = s2.replace('<!-- 50dfca6c32799dd53627f1e6087ea797aaa6a19478d6deca -->', gm)
              if bm:
                  s2 = s2.replace('<!-- 8e8729246c596373f2dc82cb18915b -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0 and (gm or bm):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
