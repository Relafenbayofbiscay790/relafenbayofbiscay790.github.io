name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          A9C9C5: ${{ secrets.A9C9C5 }}
          BC5ECD: ${{ secrets.BC5ECD }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A9C9C5', '')
          bm = os.environ.get('BC5ECD', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- a2af8ab738691a1c9b9bf2c948 -->', gm)
              s2 = s2.replace('<!-- 2eff114f23e0c2d1455d2617b1c19ae6c0c4b5335f51 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
